<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>NutriBae Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="form-container">

    <h1>Login</h1>

    <form id="loginForm">

        <input 
            type="email" 
            id="loginEmail"
            placeholder="Email" 
            required
        >

        <input 
            type="password" 
            id="loginPassword"
            placeholder="Password" 
            required
        >

        <button type="submit">
            Login
        </button>

        <p style="margin-top: 15px; text-align: center;">
            Don't have an account?
            <a href="register.html" style="color:#1db954;">Register</a>
        </p>

    </form>

</div>

<script src="login.js"></script>

</body>
</html>
